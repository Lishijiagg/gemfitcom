<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="GemFitCom logo">
  <title>GemFitCom</title>
  <desc>Three connected nodes (GEM/Fit/Community) in indigo/teal/pink with a sigmoidal kinetics curve.</desc>

  <!-- Sigmoidal saturation curve — Michaelis–Menten kinetics motif -->
  <path d="M 60 420 C 256 420 256 92 452 92"
        stroke="#9FA8DA" stroke-width="22" stroke-linecap="round"/>

  <!-- Triangular network — neutral grey edges so the tri-color nodes carry the meaning -->
  <path d="M 256 106 L 126 331 L 386 331 Z"
        stroke="#B0BEC5" stroke-width="6" stroke-linejoin="round"/>

  <!-- Three nodes — one color per pipeline stage -->
  <circle cx="256" cy="106" r="36" fill="#3F51B5"/>  <!-- GEM:    Indigo 500 -->
  <circle cx="126" cy="331" r="36" fill="#009688"/>  <!-- Fit:    Teal 500   -->
  <circle cx="386" cy="331" r="36" fill="#E91E63"/>  <!-- Com:    Pink 500   -->
</svg>
