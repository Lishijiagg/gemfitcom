<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" fill="none" role="img" aria-label="GemFitCom">
  <title>GemFitCom</title>

  <!-- Inset logo, scaled from the 512×512 master to fit 200×200 in the left slot -->
  <g transform="translate(20 20) scale(0.391)">
    <path d="M 60 420 C 256 420 256 92 452 92"
          stroke="#9FA8DA" stroke-width="22" stroke-linecap="round"/>
    <path d="M 256 106 L 126 331 L 386 331 Z"
          stroke="#3F51B5" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="256" cy="106" r="36" fill="#3F51B5"/>
    <circle cx="126" cy="331" r="36" fill="#3F51B5"/>
    <circle cx="386" cy="331" r="36" fill="#3F51B5"/>
  </g>

  <!-- Wordmark: G/F/C bold to echo the three nodes; rest of the letters regular -->
  <text x="248" y="148"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="92"
        fill="#3F51B5"
        letter-spacing="-1">
    <tspan font-weight="700">G</tspan><tspan font-weight="400">em</tspan><tspan font-weight="700">F</tspan><tspan font-weight="400">it</tspan><tspan font-weight="700">C</tspan><tspan font-weight="400">om</tspan>
  </text>
</svg>
