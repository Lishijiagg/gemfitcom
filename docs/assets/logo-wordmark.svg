<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" fill="none" role="img" aria-label="GemFitCom">
  <title>GemFitCom</title>

  <!-- Inset logo, scaled from the 512×512 master to 200×200 in the left slot -->
  <g transform="translate(20 20) scale(0.391)">
    <path d="M 60 420 C 256 420 256 92 452 92"
          stroke="#9FA8DA" stroke-width="22" stroke-linecap="round"/>
    <path d="M 256 106 L 126 331 L 386 331 Z"
          stroke="#B0BEC5" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="256" cy="106" r="36" fill="#3F51B5"/>
    <circle cx="126" cy="331" r="36" fill="#009688"/>
    <circle cx="386" cy="331" r="36" fill="#E91E63"/>
  </g>

  <!-- Wordmark: each Gem/Fit/Com group inherits its node color, leading letter bold -->
  <text x="248" y="148"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="86"
        letter-spacing="-1">
    <tspan fill="#3F51B5" font-weight="700">G</tspan><tspan fill="#3F51B5" font-weight="400">em</tspan><tspan fill="#009688" font-weight="700">F</tspan><tspan fill="#009688" font-weight="400">it</tspan><tspan fill="#E91E63" font-weight="700">C</tspan><tspan fill="#E91E63" font-weight="400">om</tspan>
  </text>
</svg>
