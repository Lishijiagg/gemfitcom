<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="GemFitCom">
  <title>GemFitCom</title>

  <!-- Triangular network edges — neutral grey so the colored nodes pop -->
  <path d="M 128 50 L 50 180 L 206 180 Z"
        stroke="#B0BEC5" stroke-width="8" stroke-linejoin="round"/>

  <!-- Three nodes — same tri-color scheme as the master logo -->
  <circle cx="128" cy="50" r="30" fill="#3F51B5"/>   <!-- GEM: Indigo -->
  <circle cx="50" cy="180" r="30" fill="#009688"/>   <!-- Fit: Teal   -->
  <circle cx="206" cy="180" r="30" fill="#E91E63"/>  <!-- Com: Pink   -->
</svg>
